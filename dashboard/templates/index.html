<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VPN Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--card:#1e293b;--card2:#334155;--border:#475569;
  --text:#f1f5f9;--text2:#94a3b8;--blue:#3b82f6;--green:#22c55e;
  --red:#ef4444;--amber:#f59e0b;--purple:#a855f7;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--blue)}

/* Header */
header{background:#0d1325;border-bottom:1px solid var(--card2);padding:8px 16px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;z-index:100}
header h1{font-size:18px;font-weight:700;white-space:nowrap}
header h1 span{color:var(--blue)}
nav{display:flex;gap:4px}
nav button{background:none;border:none;color:var(--text2);padding:8px 16px;cursor:pointer;font-size:14px;border-radius:6px;transition:.15s;flex:1;text-align:center}
nav button:hover{color:var(--text);background:var(--card)}
nav button.active{color:var(--blue);background:rgba(59,130,246,.12)}

/* Main */
main{max-width:1280px;margin:0 auto;padding:24px}
section{display:none}
section.active{display:block}

/* Stats grid */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:12px;padding:14px;border:1px solid transparent;transition:.2s}
.stat-card:hover{border-color:var(--card2)}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.blue{color:var(--blue)}
.stat-value.amber{color:var(--amber)}
.stat-value.purple{color:var(--purple)}

/* Progress bar */
.pbar{height:6px;background:var(--card2);border-radius:3px;margin-top:10px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s}

/* Tables */
.table-wrap{background:var(--card);border-radius:12px;overflow-x:auto;border:1px solid transparent;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:auto}
th{text-align:left;padding:10px 12px;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--card2);white-space:nowrap}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid rgba(71,85,105,.3)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.mono{font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:11px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#2563eb}
.btn-red{background:rgba(239,68,68,.15);color:var(--red)}
.btn-red:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text2)}

/* Toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.toolbar h2{font-size:16px;font-weight:600}

/* Badge */
.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:24px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--card2)}
.modal h3{font-size:18px;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;padding:4px 8px;border-radius:6px}
.modal-close:hover{color:var(--text);background:var(--card2)}

/* Form */
input[type="text"],input[type="search"]{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--card2);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:.15s}
input:focus{border-color:var(--blue)}
label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block}
.form-group{margin-bottom:16px}

/* Link box */
.link-box{background:var(--bg);border:1px solid var(--card2);border-radius:8px;padding:12px;word-break:break-all;font-family:monospace;font-size:12px;position:relative;margin:12px 0}
.link-box .copy-btn{position:absolute;top:8px;right:8px}

/* QR container */
.qr-wrap{display:flex;justify-content:center;margin:16px 0;background:#fff;border-radius:12px;padding:16px}
.qr-wrap svg{width:240px;height:240px}

/* Netflow filter */
.filter-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filter-row input{max-width:100%}
.filter-row select{padding:10px 14px;background:var(--bg);border:1px solid var(--card2);border-radius:8px;color:var(--text);font-size:14px}

/* Client cards */
.client-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid transparent;transition:.2s}
.client-card:hover{border-color:var(--card2)}
.client-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.client-name{font-weight:600;font-size:15px}
.client-email{font-size:11px;color:var(--text2);font-family:monospace}
.client-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.client-stat-label{font-size:10px;color:var(--text2);text-transform:uppercase}
.client-stat-val{font-size:13px;font-weight:600}
.client-actions{display:flex;gap:8px}

/* Responsive */
@media(max-width:640px){
  header{padding:6px 10px;gap:6px}
  main{padding:10px}
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:12px}
  .stat-value{font-size:20px}
  .stat-label{font-size:10px}
  nav button{padding:6px 8px;font-size:12px}
  td,th{padding:6px 8px;font-size:11px}
  .mono{font-size:10px}
  .toolbar h2{font-size:14px}
  .btn{padding:6px 12px;font-size:12px}
  .btn-sm{padding:4px 8px;font-size:11px}
  .modal{padding:16px;border-radius:12px;margin:8px}
  .modal-overlay{padding:8px}
  .qr-wrap svg{width:200px;height:200px}
  .link-box{font-size:10px;padding:10px}
}
@media(max-width:380px){
  .stats{grid-template-columns:1fr}
  .stat-value{font-size:18px}
}
</style>
</head>
<body>

<header>
  <h1><span>&#9670;</span> VPN Dashboard</h1>
  <nav>
    <button class="active" data-tab="overview">Обзор</button>
    <button data-tab="clients">Клиенты</button>
    <button data-tab="netflow">Netflow</button>
  </nav>
</header>

<main>
  <!-- ── Overview ────────────────────────── -->
  <section id="overview" class="active">
    <div class="stats" id="sys-stats"></div>
    <div class="toolbar">
      <h2>Сеть</h2>
      <button class="btn btn-sm btn-ghost" onclick="restartXray()">Перезапустить Xray</button>
    </div>
    <div class="stats" id="net-stats"></div>
  </section>

  <!-- ── Clients ─────────────────────────── -->
  <section id="clients">
    <div class="toolbar">
      <h2>Клиенты VPN</h2>
      <button class="btn btn-blue" onclick="showAddClient()">+ Добавить</button>
    </div>
    <div id="clients-list"></div>
  </section>

  <!-- ── Netflow ─────────────────────────── -->
  <section id="netflow">
    <div class="toolbar">
      <h2>Netflow / Access Log</h2>
      <button class="btn btn-sm btn-ghost" onclick="loadNetflow()">Обновить</button>
    </div>
    <div class="filter-row">
      <input type="search" id="nf-search" placeholder="Фильтр по IP, домену, email..." oninput="filterNetflow()">
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Время</th><th>Источник</th><th>Статус</th><th>Назначение</th><th>Маршрут</th><th>Клиент</th>
        </tr></thead>
        <tbody id="nf-table"></tbody>
      </table>
    </div>
  </section>
</main>

<!-- ── Add Client Modal ────────────────── -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-add')">&times;</button>
    <h3>Новый клиент</h3>
    <div class="form-group">
      <label>Имя устройства</label>
      <input type="text" id="new-name" placeholder="Телефон Маши, Ноутбук и т.д.">
    </div>
    <button class="btn btn-blue" onclick="addClient()">Создать</button>
  </div>
</div>

<!-- ── Client Detail Modal ─────────────── -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-detail')">&times;</button>
    <h3 id="detail-title">Клиент</h3>
    <div id="detail-qr" class="qr-wrap"></div>
    <label>Ссылка для импорта (скопируй в v2rayNG):</label>
    <div class="link-box" id="detail-link">
      <button class="btn btn-sm btn-ghost copy-btn" onclick="copyLink()">Копировать</button>
      <span id="detail-link-text"></span>
    </div>
    <details style="margin-top:12px">
      <summary style="cursor:pointer;color:var(--text2);font-size:13px">Параметры вручную</summary>
      <table style="margin-top:8px;font-size:12px" id="detail-params"></table>
    </details>
  </div>
</div>

<script>
// ── State ───────────────────────────────
let netflowData = [];
let currentClients = [];

// ── Tabs ────────────────────────────────
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'clients') loadClients();
    if (btn.dataset.tab === 'netflow') loadNetflow();
  });
});

// ── Helpers ─────────────────────────────
function fmtBytes(b) {
  if (!b || b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(1) + ' ' + u[i];
}

function fmtUptime(s) {
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d > 0) return d + 'д ' + h + 'ч ' + m + 'м';
  if (h > 0) return h + 'ч ' + m + 'м';
  return m + 'м';
}

function pbarColor(pct) {
  if (pct > 90) return 'var(--red)';
  if (pct > 70) return 'var(--amber)';
  return 'var(--blue)';
}

function statCard(label, value, cls, sub, pct) {
  let html = `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-value ${cls || ''}">${value}</div>`;
  if (sub) html += `<div class="stat-sub">${sub}</div>`;
  if (pct !== undefined) html += `<div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${pbarColor(pct)}"></div></div>`;
  return html + '</div>';
}

// ── System Stats ────────────────────────
async function loadSystem() {
  try {
    const r = await fetch('/api/system');
    const d = await r.json();

    document.getElementById('sys-stats').innerHTML =
      statCard('Xray', d.xray ? 'Active' : 'Down', d.xray ? 'green' : 'red',
        d.connections + ' подключений') +
      statCard('Uptime', fmtUptime(d.uptime), 'blue') +
      statCard('CPU', d.cpu + '%', '', d.cores + ' ядер', d.cpu) +
      statCard('RAM', fmtBytes(d.mem_used), '',
        fmtBytes(d.mem_used) + ' / ' + fmtBytes(d.mem_total), d.mem_pct) +
      statCard('Диск', d.disk_pct + '%', '',
        fmtBytes(d.disk_used) + ' / ' + fmtBytes(d.disk_total), d.disk_pct);

    document.getElementById('net-stats').innerHTML =
      statCard('Отправлено', fmtBytes(d.net_tx), 'purple',
        d.net_pkt_tx.toLocaleString() + ' пакетов') +
      statCard('Получено', fmtBytes(d.net_rx), 'blue',
        d.net_pkt_rx.toLocaleString() + ' пакетов');
  } catch(e) { console.error('loadSystem', e); }
}

// ── Clients ─────────────────────────────
async function loadClients() {
  try {
    const r = await fetch('/api/clients');
    currentClients = await r.json();
    const el = document.getElementById('clients-list');
    if (!currentClients.length) {
      el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:32px">Нет клиентов</div>';
      return;
    }
    el.innerHTML = currentClients.map(c => `<div class="client-card">
      <div class="client-header">
        <div>
          <div class="client-name">${esc(c.name)}</div>
          <div class="client-email">${esc(c.email)}</div>
        </div>
        <span class="badge badge-green" style="font-size:10px">${esc(c.created)}</span>
      </div>
      <div class="client-stats">
        <div><div class="client-stat-label">Upload</div><div class="client-stat-val" style="color:var(--purple)">${fmtBytes(c.up)}</div></div>
        <div><div class="client-stat-label">Download</div><div class="client-stat-val" style="color:var(--blue)">${fmtBytes(c.down)}</div></div>
        <div><div class="client-stat-label">Всего</div><div class="client-stat-val">${fmtBytes(c.up+c.down)}</div></div>
      </div>
      <div class="client-actions">
        <button class="btn btn-sm btn-ghost" style="flex:1" onclick="showDetail('${c.id}')">Конфиг / QR</button>
        <button class="btn btn-sm btn-red" onclick="delClient('${c.id}','${esc(c.name)}')">Удалить</button>
      </div>
    </div>`).join('');
  } catch(e) { console.error('loadClients', e); }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showAddClient() {
  document.getElementById('new-name').value = '';
  document.getElementById('modal-add').classList.add('show');
  document.getElementById('new-name').focus();
}

async function addClient() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return;
  try {
    const r = await fetch('/api/clients', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name})
    });
    const d = await r.json();
    if (d.error) { alert(d.error); return; }
    closeModal('modal-add');
    await loadClients();
    showDetailData(d.id, d.name, d.link);
  } catch(e) { alert('Error: ' + e); }
}

async function delClient(id, name) {
  if (!confirm('Удалить клиента "' + name + '"?')) return;
  try {
    await fetch('/api/clients/' + id, {method: 'DELETE'});
    loadClients();
  } catch(e) { alert('Error: ' + e); }
}

function showDetail(id) {
  const c = currentClients.find(x => x.id === id);
  if (c) showDetailData(c.id, c.name, c.link);
}

async function showDetailData(id, name, link) {
  document.getElementById('detail-title').textContent = name;
  document.getElementById('detail-link-text').textContent = link;

  // QR
  try {
    const r = await fetch('/api/clients/' + id + '/qr');
    document.getElementById('detail-qr').innerHTML = await r.text();
  } catch(e) {
    document.getElementById('detail-qr').innerHTML = '<span style="color:var(--text2)">QR unavailable</span>';
  }

  // Params table
  const url = new URL(link.replace('vless://', 'https://'));
  const uuid = link.split('://')[1].split('@')[0];
  const params = [
    ['Protocol', 'VLESS'],
    ['Address', url.hostname],
    ['Port', url.port],
    ['UUID', uuid],
    ['Flow', url.searchParams.get('flow')],
    ['Security', url.searchParams.get('security')],
    ['SNI', url.searchParams.get('sni')],
    ['Fingerprint', url.searchParams.get('fp')],
    ['Public Key', url.searchParams.get('pbk')],
    ['Short ID', url.searchParams.get('sid')],
    ['Transport', url.searchParams.get('type')],
  ];
  document.getElementById('detail-params').innerHTML = params.map(([k,v]) =>
    `<tr><td style="padding:4px 12px 4px 0;color:var(--text2)">${k}</td><td class="mono">${v}</td></tr>`
  ).join('');

  document.getElementById('modal-detail').classList.add('show');
}

function copyLink() {
  const text = document.getElementById('detail-link-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('#detail-link .copy-btn');
    btn.textContent = 'Скопировано!';
    setTimeout(() => btn.textContent = 'Копировать', 1500);
  });
}

// ── Netflow ─────────────────────────────
async function loadNetflow() {
  try {
    const r = await fetch('/api/netflow');
    netflowData = await r.json();
    renderNetflow(netflowData);
  } catch(e) { console.error('loadNetflow', e); }
}

function renderNetflow(data) {
  const tb = document.getElementById('nf-table');
  if (!data.length) {
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:32px">Нет записей</td></tr>';
    return;
  }
  tb.innerHTML = data.slice(0, 200).map(e => `<tr>
    <td class="mono" style="white-space:nowrap">${esc(e.time)}</td>
    <td class="mono">${esc(e.source)}</td>
    <td><span class="badge ${e.status==='accepted'?'badge-green':'badge-red'}">${esc(e.status)}</span></td>
    <td class="mono">${esc(e.dest)}</td>
    <td style="color:var(--text2);font-size:12px">${esc(e.route||'')}</td>
    <td class="mono">${esc(e.email)}</td>
  </tr>`).join('');
}

function filterNetflow() {
  const q = document.getElementById('nf-search').value.toLowerCase();
  if (!q) { renderNetflow(netflowData); return; }
  renderNetflow(netflowData.filter(e =>
    e.source.toLowerCase().includes(q) ||
    e.dest.toLowerCase().includes(q) ||
    e.email.toLowerCase().includes(q) ||
    (e.route||'').toLowerCase().includes(q)
  ));
}

// ── Modals ──────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show'));
});

// Enter to submit in add client modal
document.getElementById('new-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addClient();
});

// ── Xray restart ────────────────────────
async function restartXray() {
  if (!confirm('Перезапустить Xray?')) return;
  try {
    const r = await fetch('/api/xray/restart', {method: 'POST'});
    const d = await r.json();
    alert(d.ok ? 'Xray перезапущен' : 'Ошибка перезапуска');
    loadSystem();
  } catch(e) { alert('Error: ' + e); }
}

// ── Init & Refresh ──────────────────────
loadSystem();
setInterval(loadSystem, 5000);
</script>
</body>
</html>
